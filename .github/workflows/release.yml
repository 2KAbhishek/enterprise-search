name: Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            version:
                description: 'Release version (e.g., v1.0.0)'
                required: true
                type: string

jobs:
    test:
        name: Run Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  cache: 'npm'
                  cache-dependency-path: |
                      frontend/package-lock.json
                      backend/package-lock.json

            - name: Install frontend dependencies
              run: npm ci
              working-directory: ./frontend

            - name: Install backend dependencies
              run: npm ci
              working-directory: ./backend

            - name: Run frontend tests
              run: npm test -- --coverage --watchAll=false
              working-directory: ./frontend

            - name: Run backend tests
              run: npm test -- --coverage --watchAll=false
              working-directory: ./backend
              env:
                  NODE_ENV: test

    build:
        name: Build Release
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  cache: 'npm'
                  cache-dependency-path: |
                      frontend/package-lock.json
                      backend/package-lock.json

            - name: Install dependencies
              run: |
                  cd frontend && npm ci
                  cd ../backend && npm ci

            - name: Build applications
              run: |
                  cd frontend && npm run build
                  cd ../backend && npm run build

            - name: Create release archive
              run: |
                  mkdir -p release
                  cp -r frontend/.next release/frontend-build
                  cp -r backend/dist release/backend-build
                  cp -r backend/package*.json release/
                  tar -czf enterprise-search-${{ github.ref_name }}.tar.gz release/

            - name: Upload release artifacts
              uses: actions/upload-artifact@v3
              with:
                  name: release-build
                  path: enterprise-search-*.tar.gz

    release:
        name: Create Release
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/')

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download build artifacts
              uses: actions/download-artifact@v3
              with:
                  name: release-build

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: enterprise-search-*.tar.gz
                  generate_release_notes: true
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}